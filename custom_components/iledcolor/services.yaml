send_raw:
  name: Send raw frame
  description: >-
    Write raw bytes to the device for protocol experimentation. Bytes are sent
    verbatim (no framing/checksum added) to the chosen characteristic.
  fields:
    data:
      name: Data (hex)
      description: Hex byte string, e.g. "54 09 00 04 05 00 00 66".
      required: true
      example: "540900040500 0066"
      selector:
        text:
    characteristic:
      name: Characteristic
      description: write1 (A951, commands) or write2 (A952, bulk).
      default: write1
      selector:
        select:
          options:
            - write1
            - write2

display_text:
  name: Display text
  description: Rasterize text and send it to the panel.
  fields:
    text:
      name: Text
      description: Text to show.
      required: true
      example: "Hello"
      selector:
        text:
    color:
      name: Color
      description: RGB color (full-color panels only).
      default: [255, 255, 255]
      selector:
        color_rgb:
    effect:
      name: Effect
      description: >-
        0 static, 1 scroll left, 2 right, 3 up, 4 down, 5 snowflake, 6 scroll,
        7 laser.
      default: 0
      selector:
        number:
          min: 0
          max: 7
          mode: box
    speed:
      name: Speed
      description: Scroll/animation speed (lower is slower).
      default: 1
      selector:
        number:
          min: 0
          max: 255
          mode: box
    dwell:
      name: Dwell
      description: >-
        Hold time between pages, only visible when the text spans more than one
        screen (paged effects). 0 = no pause.
      default: 30
      selector:
        number:
          min: 0
          max: 255
          mode: box

display_image:
  name: Display image
  description: >-
    Send an image to the panel. Either upload a file or give a local path / URL.
  fields:
    file:
      name: Upload
      description: Upload an image file directly from your device.
      selector:
        file:
          accept: ".png,.jpg,.jpeg,.bmp,.webp,.gif"
    source:
      name: Source path / URL
      description: Local file path or http(s) URL (alternative to Upload).
      example: "/config/www/icon.png"
      selector:
        text:
    fit:
      name: Fit
      description: How to fit the image to the panel.
      default: contain
      selector:
        select:
          options:
            - contain
            - cover
            - stretch
    background:
      name: Background key color
      description: >-
        RGB color treated as transparent (off) on the panel. Use for images with
        a baked-in solid background, e.g. white [255, 255, 255]. Real alpha
        transparency is handled automatically.
      selector:
        color_rgb:
    tolerance:
      name: Background tolerance
      description: How close a pixel must be to the key color to be turned off (0-255).
      default: 0
      selector:
        number:
          min: 0
          max: 255
          mode: box
    effect:
      name: Effect
      description: >-
        0 static, 1 scroll left, 2 right, 3 up, 4 down, 5 snowflake, 6 scroll,
        7 laser.
      default: 0
      selector:
        number:
          min: 0
          max: 7
          mode: box
    speed:
      name: Speed
      description: Scroll/animation speed (lower is slower).
      default: 1
      selector:
        number:
          min: 0
          max: 255
          mode: box
    dwell:
      name: Dwell
      description: Hold time for paged effects (single images stay on one frame). 0 = no pause.
      default: 30
      selector:
        number:
          min: 0
          max: 255
          mode: box

display_gif:
  name: Display GIF
  description: >-
    Load a GIF (local path or http(s) URL), decode its frames, and send them to
    the panel. Lower Frame hold for faster playback, or reduce Max frames to
    shorten the loop.
  fields:
    file:
      name: Upload
      description: Upload a GIF file directly from your device.
      selector:
        file:
          accept: ".gif"
    source:
      name: Source path / URL
      description: Local file path or http(s) URL (alternative to Upload).
      example: "/config/www/anim.gif"
      selector:
        text:
    fit:
      name: Fit
      description: How to fit decoded frames to the panel.
      default: contain
      selector:
        select:
          options:
            - contain
            - cover
            - stretch
    background:
      name: Background key color
      description: >-
        RGB color treated as transparent (turned off) on the panel. Use for GIFs
        with a baked-in solid background, e.g. white [255, 255, 255]. Leave unset
        for GIFs with real alpha transparency (handled automatically).
      selector:
        color_rgb:
    tolerance:
      name: Background tolerance
      description: How close a pixel must be to the key color to be turned off (0-255).
      default: 0
      selector:
        number:
          min: 0
          max: 255
          mode: box
    max_frames:
      name: Max frames
      description: >-
        Cap the number of frames by evenly sampling. Fewer frames = shorter,
        faster loop. Leave unset to keep all frames.
      selector:
        number:
          min: 1
          max: 255
          mode: box
    frame_hold:
      name: Frame hold
      description: >-
        Per-frame hold time on the panel. Lower = faster playback (1 is fastest,
        10 is a comfortable default). The vendor app floors this at 10, but the
        device honors lower values.
      default: 10
      selector:
        number:
          min: 1
          max: 255
          mode: box
    effect:
      name: Effect
      description: >-
        Overlay effect: 0 none, 1 scroll left, 2 right, 3 up, 4 down,
        5 snowflake, 6 scroll, 7 laser.
      default: 0
      selector:
        number:
          min: 0
          max: 7
          mode: box
    speed:
      name: Speed
      description: Override playback speed byte. Leave unset to derive from the GIF timing.
      selector:
        number:
          min: 0
          max: 255
          mode: box

display_color:
  name: Display solid color
  description: Fill the whole panel with a single color.
  fields:
    color:
      name: Color
      description: RGB fill color.
      required: true
      default: [255, 0, 0]
      selector:
        color_rgb:
    effect:
      name: Effect
      description: >-
        0 static, 1 scroll left, 2 right, 3 up, 4 down, 5 snowflake, 6 scroll,
        7 laser.
      default: 0
      selector:
        number:
          min: 0
          max: 7
          mode: box
    speed:
      name: Speed
      description: Animation/scroll speed (lower is slower).
      default: 1
      selector:
        number:
          min: 0
          max: 255
          mode: box
    dwell:
      name: Dwell
      description: Hold time for paged effects. 0 = no pause.
      default: 30
      selector:
        number:
          min: 0
          max: 255
          mode: box
